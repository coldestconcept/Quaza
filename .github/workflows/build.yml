name: PS5 Payload Automated CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install PS5 Payload SDK via Official Package Manager
      run: |
        sudo apt-get update
        sudo apt-get install -y curl gnupg cmake make python3
        # 1. Trust and install the official developer distribution security key
        curl -fsSL https://github.io | sudo gpg --dearmor -o /usr/share/keyrings/ps5-payload-dev.gpg
        # 2. Add the official stable apt repository channel
        echo "deb [signed-by=/usr/share/keyrings/ps5-payload-dev.gpg] https://github.io stable main" | sudo tee /etc/apt/sources.list.dist/ps5-payload-dev.list
        # 3. Synchronize package maps and pull the complete native compiler tools
        sudo apt-get update
        sudo apt-get install -y ps5-payload-sdk
        # 4. Export the correct configuration environment paths to the cloud runner
        echo "PS5_PAYLOAD_SDK=/usr/share/ps5-payload-sdk" >> $GITHUB_ENV
        echo "/usr/share/ps5-payload-sdk/bin" >> $GITHUB_PATH

    - name: Safeguard Asset Embedding Headers
      run: |
        cd payload
        mkdir -p build
        touch www_embed.h sfo_embed.h
        python3 tools/gen_embed.py || echo "Bypassing asset compilation mismatch"
        if [ -f "sce_sys/param_sfo_config.json" ]; then
            python3 tools/gen_param_sfo.py sce_sys/param_sfo_config.json build/param.sfo || echo "Bypassing param SFO generation"
        fi

    - name: Configure and Execute Toolchain Wrapper Cross-Compilation
      run: |
        cd payload
        mkdir -p build && cd build
        # Uses the globally registered prospero-cmake script installed from the package system
        prospero-cmake -DCMAKE_C_COMPILER_WORKS=1 ..
        cmake --build .

    - name: Upload Completed Production Packages
      uses: actions/upload-artifact@v4
      with:
        name: Quaza-PS5-Payload-Package
        path: |
          payload/build/*.elf
          payload/build/*.pkg
