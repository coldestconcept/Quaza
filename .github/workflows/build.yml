name: PS5 Payload Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Payload
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake llvm-18 clang-18 lld lld-18 make python3
          
          # Deploy prospero-lld wrapper script pointing to the absolute versioned binary path
          sudo tee /usr/bin/prospero-lld << 'WRAPPER'
          #!/bin/bash
          exec /usr/bin/ld.lld-18 "$@"
          WRAPPER
          sudo chmod +x /usr/bin/prospero-lld
          
          # Inject the wrapper into the LLVM binary path search index
          sudo mkdir -p /usr/lib/llvm-18/bin
          sudo cp /usr/bin/prospero-lld /usr/lib/llvm-18/bin/prospero-lld

      - name: Checkout PS5 SDK
        uses: actions/checkout@v4
        with:
          repository: ps5-payload-dev/sdk
          path: target-sdk

      - name: Build and Consolidate SDK
        run: |
          cd target-sdk
          make
          mkdir -p lib
          # Consolidate dynamic stubs, static libraries, and custom kernel modules
          find . -name "*.a" -exec cp {} ./lib/ \;
          find . -name "*.so" -exec cp {} ./lib/ \;
          cp crt/crt1.o ./lib/
          
          # Generate and compile the SceLncUtil stub dynamically using correct linker wrapper flags
          echo 'void sceLncUtilLaunchWebBrowser2() {}' > libSceLncUtil.c
          clang-18 -target x86_64-sie-ps5 -fPIC -shared -Wl,-soname,libSceLncUtil.sprx -o lib/libSceLncUtil.so libSceLncUtil.c
          
          echo "PS5_PAYLOAD_SDK=$GITHUB_WORKSPACE/target-sdk" >> $GITHUB_ENV

      - name: Run Asset Generators
        run: |
          cd main-repo/payload
          python3 tools/gen_embed.py || echo "gen_embed script skipped or unavailable"
          if [ -f "sce_sys/param_sfo_config.json" ]; then
              python3 tools/gen_param_sfo.py sce_sys/param_sfo_config.json build/param.sfo || echo "SFO generation bypassed"
          fi

      - name: Generate Compiler Toolchain
        run: |
          cat << 'TC' > ps5_toolchain.cmake
          set(CMAKE_SYSTEM_NAME FreeBSD)
          set(CMAKE_SYSTEM_PROCESSOR x86_64)
          set(CMAKE_C_COMPILER clang-18)
          set(CMAKE_C_COMPILER_TARGET x86_64-sie-ps5)
          
          set(PS5_SDK "$ENV{PS5_PAYLOAD_SDK}")
          
          # Isolate system headers using sysroot and isystem flags
          set(CMAKE_C_FLAGS "--sysroot=${PS5_SDK} -isystem ${PS5_SDK}/include -isystem ${PS5_SDK}/include/freebsd" CACHE STRING "" FORCE)
          
          set(CMAKE_AR llvm-ar-18)
          set(CMAKE_RANLIB llvm-ranlib-18)
          set(CMAKE_TRY_COMPILE_TARGET_TYPE STATIC_LIBRARY)
          
          # Enforce position-independent code configurations natively
          set(CMAKE_POSITION_INDEPENDENT_CODE ON)
          set(BUILD_SHARED_LIBS OFF CACHE INTERNAL "Shared libs not available")
          
          include_directories(${PS5_SDK}/include ${PS5_SDK}/include/freebsd)
          link_directories(${PS5_SDK}/lib)
          TC

      - name: Compile PS5 Payload Binaries
        working-directory: main-repo/payload
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/ps5_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          
          # Convert position-independent ELF to raw dynamic BIN payload
          llvm-objcopy-18 -O binary build/quaza_payload.elf build/quaza_payload.bin

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quaza_payload_package
          path: |
            main-repo/payload/build/quaza_payload.elf
            main-repo/payload/build/quaza_payload.bin
