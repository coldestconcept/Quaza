name: PS5 Payload Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Payload
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake llvm clang lld make python3

      - name: Checkout PS5 SDK
        uses: actions/checkout@v4
        with:
          repository: ps5-payload-dev/sdk
          path: target-sdk

      - name: Compile SDK Stubs
        # CRITICAL: This creates the libkernel.a the linker is currently missing
        working-directory: target-sdk
        run: make

      - name: Build Payload
        working-directory: main-repo/payload
        run: |
          mkdir build
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/target-sdk/cmake/ps5.toolchain.cmake \
            -DPS5_PAYLOAD_SDK=$GITHUB_WORKSPACE/target-sdk \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quaza_payload
          path: main-repo/payload/build/quaza_payload.elf
