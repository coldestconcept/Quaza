name: PS5 Payload Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake llvm clang lld make python3

      - name: Checkout PS5 SDK
        uses: actions/checkout@v4
        with:
          repository: ps5-payload-dev/sdk
          path: target-sdk

      - name: Compile SDK Stubs
        # This generates libkernel.a and other vital stubs
        working-directory: target-sdk
        run: make

      - name: Build Payload
        working-directory: main-repo/payload
        env:
          PS5_PAYLOAD_SDK: ${{ github.workspace }}/target-sdk
        run: |
          mkdir build
          # Fixed the path to prospero.cmake and passed the SDK root
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$PS5_PAYLOAD_SDK/toolchain/prospero.cmake \
            -DPS5_PAYLOAD_SDK=$PS5_PAYLOAD_SDK \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Upload ELF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quaza_payload
          path: main-repo/payload/build/quaza_payload.elf
