<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quaza — PS5 PKG Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(160deg, #5ecfee 0%, #85ddf5 40%, #aeeafc 70%, #c8f2ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ── Glass card ── */
        .glass {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border-radius: 28px;
            border: 1.5px solid rgba(255, 255, 255, 0.72);
            box-shadow:
                0 8px 40px rgba(80, 180, 220, 0.22),
                0 1.5px 0px rgba(255,255,255,0.9) inset;
            padding: 2.4rem 2.2rem 2rem;
        }

        /* ── Header ── */
        .logo {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .logo h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #1a3a52;
            text-shadow: 0 2px 12px rgba(255,255,255,0.6);
        }
        .logo p {
            color: #2e6080;
            font-size: 0.92rem;
            margin-top: 4px;
            font-weight: 500;
        }

        /* ── Badges ── */
        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 1.6rem;
        }
        .badge {
            padding: 5px 13px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255,255,255,0.45);
            border: 1px solid rgba(255,255,255,0.75);
            color: #1a4a6e;
            backdrop-filter: blur(8px);
            letter-spacing: 0.2px;
        }
        .badge.active {
            background: rgba(94, 207, 238, 0.28);
            border-color: rgba(94, 207, 238, 0.65);
            color: #0d3550;
        }

        /* ── Section title ── */
        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #2e6080;
            margin-bottom: 1rem;
        }

        /* ── Form ── */
        .field {
            margin-bottom: 1.1rem;
        }
        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #1a3a52;
            margin-bottom: 6px;
        }
        input[type="text"] {
            width: 100%;
            padding: 11px 14px;
            background: rgba(255, 255, 255, 0.55);
            border: 1.5px solid rgba(255,255,255,0.8);
            border-radius: 12px;
            color: #1a3a52;
            font-family: monospace;
            font-size: 0.9rem;
            backdrop-filter: blur(6px);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]::placeholder { color: #7ab5cc; }
        input[type="text"]:focus {
            border-color: rgba(94, 207, 238, 0.9);
            box-shadow: 0 0 0 3px rgba(94, 207, 238, 0.2);
        }
        .hint {
            font-size: 0.75rem;
            color: #4a8aaa;
            margin-top: 4px;
        }

        /* ── Path field + browse button ── */
        .path-row {
            display: flex;
            gap: 8px;
        }
        .path-row input[type="text"] { flex: 1; min-width: 0; }
        .browse-btn {
            flex-shrink: 0;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.55);
            border: 1.5px solid rgba(255,255,255,0.8);
            border-radius: 12px;
            color: #1a7fa0;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: background 0.15s, transform 0.1s, border-color 0.15s;
        }
        .browse-btn:hover {
            background: rgba(94, 207, 238, 0.28);
            border-color: rgba(94, 207, 238, 0.9);
        }
        .browse-btn:active { transform: scale(0.94); }

        /* ── Folder browser modal ── */
        .browser-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 35, 50, 0.45);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .browser-overlay.open { display: flex; }
        .browser-modal {
            width: 100%;
            max-width: 460px;
            max-height: 78vh;
            display: flex;
            flex-direction: column;
            background: rgba(235, 250, 255, 0.92);
            backdrop-filter: blur(20px) saturate(160%);
            border-radius: 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 60px rgba(20, 60, 90, 0.35);
            overflow: hidden;
        }
        .browser-modal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(45, 120, 150, 0.15);
            background: rgba(255,255,255,0.35);
        }
        .browser-up-btn, .browser-close-btn, .browser-bookmark-btn {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 9px;
            background: rgba(255,255,255,0.6);
            color: #1a4a6e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            transition: background 0.15s, color 0.15s;
        }
        .browser-up-btn:hover:not(:disabled), .browser-close-btn:hover, .browser-bookmark-btn:hover:not(:disabled) { background: rgba(94, 207, 238, 0.35); }
        .browser-up-btn:disabled, .browser-bookmark-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .browser-bookmark-btn.active {
            color: #e0a422;
            background: rgba(224, 164, 34, 0.18);
        }
        .browser-bookmark-btn.active svg path { fill: currentColor; fill-opacity: 0.35; }
        .browser-breadcrumb {
            flex: 1;
            min-width: 0;
            font-family: monospace;
            font-size: 0.82rem;
            color: #1a3a52;
            white-space: nowrap;
            overflow-x: auto;
            font-weight: 600;
        }
        .browser-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
            min-height: 220px;
        }
        .browser-loading, .browser-empty {
            padding: 2rem 1rem;
            text-align: center;
            color: #4a8aaa;
            font-size: 0.85rem;
        }
        .browser-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
            transition: background 0.12s;
        }
        .browser-row:hover { background: rgba(94, 207, 238, 0.18); }
        .browser-row.selected {
            background: rgba(45, 200, 239, 0.32);
            box-shadow: inset 0 0 0 1.5px rgba(26, 127, 160, 0.6);
        }
        .browser-row.disabled {
            opacity: 0.5;
            cursor: default;
        }
        .browser-row.disabled:hover { background: transparent; }
        .browser-row-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2e8fb0;
        }
        .browser-row-icon.file { color: #7ab5cc; }
        .browser-row-name {
            flex: 1;
            min-width: 0;
            font-size: 0.88rem;
            color: #1a3a52;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .browser-row-chevron {
            flex-shrink: 0;
            color: #7ab5cc;
            font-size: 0.75rem;
        }
        .browser-row-remove {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 7px;
            color: #9ab8c6;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .browser-row-remove:hover { background: rgba(220, 90, 90, 0.18); color: #c04040; }
        .browser-section-label {
            padding: 8px 12px 4px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #5a9ab5;
        }
        .browser-section-divider {
            margin: 4px 10px 6px;
            border-top: 1px solid rgba(45, 120, 150, 0.15);
        }
        .browser-modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 16px;
            border-top: 1px solid rgba(45, 120, 150, 0.15);
            background: rgba(255,255,255,0.35);
        }
        .browser-selected-path {
            flex: 1;
            min-width: 0;
            font-family: monospace;
            font-size: 0.75rem;
            color: #2e6080;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .browser-footer-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .browser-footer-actions .btn {
            width: auto;
            padding: 9px 16px;
            font-size: 0.85rem;
            border-radius: 10px;
        }
        .browser-cancel-btn {
            background: rgba(255,255,255,0.6) !important;
            color: #1a4a6e !important;
            box-shadow: none !important;
        }
        .browser-select-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Mode tabs (PS5 Remote vs This Device) ── */
        .mode-tabs {
            display: flex;
            gap: 6px;
            background: rgba(255,255,255,0.35);
            border: 1.5px solid rgba(255,255,255,0.7);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 0.7rem;
        }
        .mode-tab {
            flex: 1;
            padding: 8px 10px;
            border: none;
            border-radius: 9px;
            background: transparent;
            color: #2e6080;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .mode-tab.active {
            background: rgba(94, 207, 238, 0.4);
            color: #0d3550;
            box-shadow: 0 1px 4px rgba(20,90,120,0.18);
        }
        .mode-hint {
            margin-bottom: 1rem;
            margin-top: -2px;
        }
        .local-browse-btn {
            background: rgba(255, 255, 255, 0.55) !important;
            border: 1.5px solid rgba(255,255,255,0.8) !important;
            color: #1a7fa0 !important;
            box-shadow: none !important;
            font-weight: 700;
        }
        .local-browse-btn:hover { background: rgba(94, 207, 238, 0.28) !important; }

        /* ── Checkbox ── */
        .check-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.4rem;
        }
        .check-row input[type="checkbox"] {
            width: 17px;
            height: 17px;
            accent-color: #2eaacc;
            cursor: pointer;
        }
        .check-row label {
            margin: 0;
            font-size: 0.84rem;
            font-weight: 500;
            color: #1e4d6b;
            cursor: pointer;
        }

        /* ── Button ── */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #2dc8ef 0%, #1a9ec0 100%);
            color: #fff;
            box-shadow: 0 4px 18px rgba(45, 200, 239, 0.45);
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(45, 200, 239, 0.5);
        }
        .btn:active:not(:disabled) { transform: translateY(0); }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; }

        /* ── Status box ── */
        #status-box {
            display: none;
            margin-top: 1.2rem;
            padding: 1rem 1.1rem;
            background: rgba(255,255,255,0.45);
            border-radius: 14px;
            border-left: 4px solid #2dc8ef;
            backdrop-filter: blur(8px);
        }
        .status-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #2e6080;
            margin-bottom: 5px;
        }
        #statusTxt {
            font-size: 0.9rem;
            color: #1a3a52;
            line-height: 1.5;
        }
        .prog-track {
            background: rgba(200,240,255,0.6);
            border-radius: 99px;
            height: 7px;
            margin-top: 10px;
            overflow: hidden;
        }
        #progressBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2dc8ef, #1a9ec0);
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        /* ── Footer link to pkg.html ── */
        .alt-link {
            text-align: center;
            margin-top: 1.4rem;
            font-size: 0.82rem;
            color: #2e6080;
        }
        .alt-link a {
            color: #1a7fa0;
            font-weight: 600;
            text-decoration: none;
        }
        .alt-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="glass">
    <div class="logo">
        <h1>Quaza</h1>
        <p>Browser-Based PS5 Homebrew PKG Tool</p>
    </div>

    <div class="badges">
        <span class="badge active">● LibProsperoPKG Engine</span>
        <span class="badge active">● ShadowMount Plus</span>
        <span class="badge active">● Live WebKit API</span>
        <span class="badge">● Auto-Backport</span>
    </div>

    <p class="section-title">PKG Converter</p>

    <div class="mode-tabs" id="modeTabs">
        <button type="button" class="mode-tab active" id="modeTabRemote" data-mode="remote">PS5 Remote</button>
        <button type="button" class="mode-tab" id="modeTabLocal" data-mode="local">This Device</button>
    </div>
    <div class="hint mode-hint" id="modeHint" style="display:none;"></div>

    <div id="remoteFields">
        <div class="field">
            <label for="dumpPath">Decrypted Title Directory Path</label>
            <div class="path-row">
                <input type="text" id="dumpPath" placeholder="/mnt/usb0/CUSA00000-app">
                <button type="button" class="browse-btn" id="browseBtn" title="Browse for folder" aria-label="Browse for folder">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 6.5C3 5.67157 3.67157 5 4.5 5H9.17157C9.5891 5 10.0335 5.17851 10.3336 5.49881L11.5 7H19.5C20.3284 7 21 7.67157 21 8.5V17.5C21 18.3284 20.3284 19 19.5 19H4.5C3.67157 19 3 18.3284 3 17.5V6.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="localFields" style="display:none;">
        <div class="field">
            <label for="localFolderInput">Game Dump Folder (on this device)</label>
            <input type="file" id="localFolderInput" webkitdirectory directory multiple style="display:none;">
            <button type="button" class="btn local-browse-btn" id="localBrowseBtn">Choose Folder…</button>
            <div class="hint" id="localFolderHint">No folder selected.</div>
        </div>
    </div>

    <div class="field">
        <label for="contentId">Content ID</label>
        <input type="text" id="contentId" placeholder="CUSA00000-XXXX00000_00-XXXXXXXXXX000000">
        <div class="hint" id="autoDetectHint">Tab out of the path above to auto-detect.</div>
    </div>

    <div class="check-row" id="backportRow">
        <input type="checkbox" id="enableBackport" checked>
        <label for="enableBackport">Auto-query prosperopatches.com for delta down-ports</label>
    </div>

    <button class="btn" id="convertBtn">Compile &amp; Deploy Native PKG</button>

    <div id="status-box">
        <div class="status-label">Runtime Status</div>
        <span id="statusTxt"></span>
        <div class="prog-track">
            <div id="progressBar"></div>
        </div>
    </div>

    <div class="alt-link">
        Also try the <a href="pkg.html">Advanced PKG Converter →</a>
    </div>
</div>

<div class="browser-overlay" id="browserOverlay">
    <div class="browser-modal">
        <div class="browser-modal-header">
            <button type="button" class="browser-up-btn" id="browserUpBtn" title="Up one level" aria-label="Up one level">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 19V5M12 5L6 11M12 5L18 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="browser-breadcrumb" id="browserBreadcrumb">Storage Devices</div>
            <button type="button" class="browser-bookmark-btn" id="browserBookmarkBtn" title="Bookmark this folder" aria-label="Bookmark this folder" disabled>
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 3.5C6 3.22 6.22 3 6.5 3H17.5C17.78 3 18 3.22 18 3.5V20.5C18 20.94 17.47 21.16 17.16 20.85L12.35 16.04C12.16 15.85 11.84 15.85 11.65 16.04L6.84 20.85C6.53 21.16 6 20.94 6 20.5V3.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                </svg>
            </button>
            <button type="button" class="browser-close-btn" id="browserCloseBtn" aria-label="Close">✕</button>
        </div>
        <div class="browser-modal-body" id="browserList">
            <div class="browser-loading">Loading…</div>
        </div>
        <div class="browser-modal-footer">
            <span class="browser-selected-path" id="browserSelectedLabel"></span>
            <div class="browser-footer-actions">
                <button type="button" class="btn browser-cancel-btn" id="browserCancelBtn">Cancel</button>
                <button type="button" class="btn browser-select-btn" id="browserSelectBtn" disabled>Select Folder</button>
            </div>
        </div>
    </div>
</div>

<script src="js/snow.js"></script>
<script src="js/demo.js"></script>
<script src="js/browser.js"></script>
<script src="js/sfo-parser.js"></script>
<script src="js/wasm-builder.js"></script>
<script src="app.js"></script>
</body>
</html>
